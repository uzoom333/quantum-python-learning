# docker-compose.yml
# Sobe o ambiente quântico com um comando só

services:
  quantum-dev:
    build: .
    container_name: quantum-lab
    ports:
      - "8888:8888"  # Jupyter Lab
    volumes:
      - ./projetos:/workspace/projetos      # Seus projetos persistem
      - ./notebooks:/workspace/notebooks    # Seus notebooks persistem
    environment:
      - QISKIT_IBM_TOKEN=${QISKIT_IBM_TOKEN:-}  # Token IBM (opcional)
    command: >
      bash -c "
        echo '🔬 Iniciando Jupyter Lab...' &&
        jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --allow-root
        --NotebookApp.token=''
        --NotebookApp.password=''
      "
